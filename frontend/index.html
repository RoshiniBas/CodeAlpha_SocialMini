<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialMini</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ========== AUTH SCREEN (shown when not logged in) ========== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <h1 class="logo">🌱 SocialMini</h1>
      <p class="auth-tagline">A tiny social network. Just vibes.</p>

      <!-- Tab buttons -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="login-tab">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="your_username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary full-width" onclick="login()">Login</button>
        <p id="login-error" class="error-msg"></p>
      </div>

      <!-- Register Form -->
      <div id="register-tab" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="cool_username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Bio (optional)</label>
          <input type="text" id="reg-bio" placeholder="Software dev & coffee lover ☕" />
        </div>
        <button class="btn btn-primary full-width" onclick="register()">Create Account</button>
        <p id="register-error" class="error-msg"></p>
      </div>
    </div>
  </div>

  <!-- ========== MAIN APP (shown when logged in) ========== -->
  <div id="app-screen" class="app-screen" style="display:none">

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <h2 class="logo-small">🌱</h2>
      <ul class="nav-links">
        <li><button class="nav-btn active" id="nav-feed" onclick="navigate('feed')">🏠 Home</button></li>
        <li><button class="nav-btn" id="nav-explore" onclick="navigate('explore')">🔍 Explore</button></li>
        <li><button class="nav-btn" id="nav-profile" onclick="navigate('profile')">👤 Profile</button></li>
      </ul>
      <button class="btn btn-outline logout-btn" onclick="logout()">Logout</button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">

      <!-- ===== FEED PAGE ===== -->
      <div id="page-feed" class="page">
        <div class="page-header">
          <h2>Your Feed</h2>
        </div>

        <!-- Create Post Box -->
        <div class="create-post-box">
          <img id="feed-avatar" src="" alt="avatar" class="avatar-sm" />
          <div class="post-input-area">
            <textarea id="post-content" placeholder="What's on your mind?" maxlength="280"></textarea>
            <div class="post-actions-row">
              <span id="char-count" class="char-count">0/280</span>
              <button class="btn btn-primary" onclick="createPost()">Post</button>
            </div>
          </div>
        </div>

        <!-- Posts List -->
        <div id="feed-posts" class="posts-list">
          <p class="loading-msg">Loading feed...</p>
        </div>
      </div>

      <!-- ===== EXPLORE PAGE ===== -->
      <div id="page-explore" class="page" style="display:none">
        <div class="page-header">
          <h2>Explore</h2>
        </div>
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search users..." oninput="searchUsers()" />
        </div>
        <div id="search-results" class="user-list"></div>
        <hr class="divider"/>
        <h3 class="section-title">All Posts</h3>
        <div id="explore-posts" class="posts-list">
          <p class="loading-msg">Loading posts...</p>
        </div>
      </div>

      <!-- ===== PROFILE PAGE ===== -->
      <div id="page-profile" class="page" style="display:none">
        <!-- Profile content is injected here dynamically -->
        <div id="profile-content"></div>
      </div>

    </main>

    <!-- Right Panel: Who to Follow / User Info -->
    <aside class="right-panel">
      <div class="user-card" id="sidebar-user-card">
        <!-- Injected by JS -->
      </div>
      <div class="suggestions-box">
        <h4>Find People</h4>
        <div id="suggestions-list">
          <p class="loading-msg">Loading...</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- ========== POST DETAIL MODAL ========== -->
  <div id="post-modal" class="modal" style="display:none" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closePostModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ========== TOAST NOTIFICATION ========== -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
